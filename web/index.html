<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>BlazingIce – City Racer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    #gameCanvas { display: block; width: 100vw; height: 100vh; }
    #hudCanvas {
      position: fixed;
      right: 10px;
      bottom: 10px;
      width: 220px;
      height: 260px;
      pointer-events: none;
      z-index: 10;
    }

    /* ── Loading screen ── */
    #loadingScreen {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background-image: url('assets/loading.png');
      background-size: cover;
      background-position: center;
      transition: opacity 0.6s ease;
    }
    #loadingScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loadingSpinner {
      position: absolute;
      right: 24px;
      bottom: 24px;
      font-size: 48px;
      animation: shakerSpin 1.1s infinite ease-in-out;
      filter: drop-shadow(0 0 8px rgba(0,0,0,0.6));
    }
    @keyframes shakerSpin {
      0%   { transform: rotate(0deg) scale(1); }
      25%  { transform: rotate(200deg) scale(1.15); }
      50%  { transform: rotate(360deg) scale(0.9); }
      75%  { transform: rotate(520deg) scale(1.1); }
      100% { transform: rotate(720deg) scale(1); }
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <canvas id="hudCanvas" width="220" height="260"></canvas>

  <div id="loadingScreen">
    <div id="loadingSpinner">🥤</div>
  </div>

  <script>
    function updateHud(speedKmh, maxSpeedNow, nitroPercent, nitroActive) {
      const canvas = document.getElementById('hudCanvas');
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);

      const cx = W / 2, cy = H - 45;
      const gaugeRadius = 75;
      const dialMax = 175;
      const normalMax = 125;

      const nitroRadius = gaugeRadius + 22;
      const nitroStart = Math.PI * 1.12;
      const nitroEnd = Math.PI * 1.88;

      ctx.lineWidth = 9;
      ctx.lineCap = 'round';
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.beginPath();
      ctx.arc(cx, cy, nitroRadius, nitroStart, nitroEnd);
      ctx.stroke();

      const pct = Math.max(0, Math.min(1, nitroPercent / 100));
      const nitroFillEnd = nitroStart + (nitroEnd - nitroStart) * pct;
      ctx.strokeStyle = nitroActive ? '#5fd0ff' : '#2196f3';
      ctx.shadowColor = '#2196f3';
      ctx.shadowBlur = nitroActive ? 16 : 3;
      ctx.beginPath();
      ctx.arc(cx, cy, nitroRadius, nitroStart, nitroFillEnd);
      ctx.stroke();
      ctx.shadowBlur = 0;

      const startAngle = Math.PI * 0.75;
      const endAngle = Math.PI * 2.25;

      ctx.beginPath();
      ctx.arc(cx, cy, gaugeRadius, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(10,10,15,0.75)';
      ctx.fill();
      ctx.lineWidth = 3;
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.stroke();

      const normalEndAngle = startAngle + (endAngle - startAngle) * (normalMax / dialMax);
      ctx.lineWidth = 6;
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.beginPath();
      ctx.arc(cx, cy, gaugeRadius - 10, startAngle, normalEndAngle);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(95,208,255,0.6)';
      ctx.beginPath();
      ctx.arc(cx, cy, gaugeRadius - 10, normalEndAngle, endAngle);
      ctx.stroke();

      ctx.font = '10px sans-serif';
      ctx.fillStyle = '#ddd';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (let v = 0; v <= dialMax; v += 25) {
        const a = startAngle + (endAngle - startAngle) * (v / dialMax);
        const x1 = cx + Math.cos(a) * (gaugeRadius - 16);
        const y1 = cy + Math.sin(a) * (gaugeRadius - 16);
        const x2 = cx + Math.cos(a) * (gaugeRadius - 22);
        const y2 = cy + Math.sin(a) * (gaugeRadius - 22);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
        const lx = cx + Math.cos(a) * (gaugeRadius - 32);
        const ly = cy + Math.sin(a) * (gaugeRadius - 32);
        ctx.fillText(v.toString(), lx, ly);
      }

      const clamped = Math.max(0, Math.min(dialMax, speedKmh));
      const needleAngle = startAngle + (endAngle - startAngle) * (clamped / dialMax);
      ctx.strokeStyle = '#ff3b3b';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(needleAngle) * (gaugeRadius - 18), cy + Math.sin(needleAngle) * (gaugeRadius - 18));
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(cx, cy, 6, 0, Math.PI * 2);
      ctx.fillStyle = '#ddd';
      ctx.fill();

      ctx.font = 'bold 20px sans-serif';
      ctx.fillStyle = '#fff';
      ctx.fillText(Math.round(speedKmh).toString(), cx, cy + 28);
      ctx.font = '10px sans-serif';
      ctx.fillStyle = '#aaa';
      ctx.fillText('km/h', cx, cy + 43);
    }
    window.updateHud = updateHud;
  </script>

  <script type="module">
    import init from './blazingice_bevy.js';
    init().then(() => {
      const loadingScreen = document.getElementById('loadingScreen');
      loadingScreen.classList.add('hidden');
      setTimeout(() => loadingScreen.remove(), 700);
    });
  </script>
</body>
</html>
